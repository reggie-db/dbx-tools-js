name: Release

# Tag-driven release. Push a `v<version>` tag (use `bun run tag` to
# generate one from the current package.json versions) and this
# workflow publishes every publishable workspace to npm.
#
# Locally:
#   bun changeset                         # record what's changing
#   bun run version                       # bump versions + write CHANGELOG
#   git commit -am "chore: version packages"
#   git push origin main
#   bun run tag                           # create + push v<version>
#
# The tag push fires this workflow. `bun run release` runs
# `devkit release` from `@dbx-tools/devkit`, which builds every
# publishable package and then publishes each with `bun publish`. The
# build step is intentionally not duplicated here: `release` already
# builds before it publishes. Just before each `bun publish`, `release`
# stamps the publish-ready fields (the expanded conditional `exports`,
# `main`, `types`, `files`, `license`) into the manifest and restores
# the slim source manifest immediately after, so committed
# `package.json` files are never left mutated. `workspace:*` and
# `catalog:` specifiers are resolved by `bun publish`.
#
# Registry + auth: `bun publish` authenticates from npm-config env
# vars, not from setup-node's `~/.npmrc` - bun does not expand the
# `${NODE_AUTH_TOKEN}` placeholder that setup-node writes into that
# file, so the token has to be handed to bun directly. `NPM_CONFIG_TOKEN`
# (the NPM_TOKEN automation secret from npmjs.com → Access Tokens) and
# `NPM_CONFIG_REGISTRY` (real npm) are set on the publish step below.
# Dev machines publish to whatever their own gitignored `~/.npmrc`
# points at (e.g. a local Verdaccio), so CI is the only place that
# targets real npm.
#
# Manual trigger is also enabled (workflow_dispatch) for one-off
# republishes that don't go through a tag - useful when retrying a
# partial publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          # Provides Node (and an `npm` >= 11.5.1) for any tooling that
          # needs it and keeps the workflow OIDC/provenance-ready.
          # `bun publish` does NOT read the `~/.npmrc` this writes - it
          # authenticates from the `NPM_CONFIG_*` env on the publish step
          # below - so the auth-token line here is unused by the upload.
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        # Not `--frozen-lockfile`: `bun.lock` is intentionally not
        # committed, so a frozen install has nothing to freeze against and
        # never writes the lockfile to disk. A plain `bun install` resolves
        # and writes `bun.lock`, which the pacwich-based build scripts read
        # to discover the workspaces.
        run: bun install

      - name: Publish
        # `release` builds every package and then publishes; no separate
        # build step is needed. `bun publish` reads these npm-config env
        # vars for the registry + auth token (it does not pick up the
        # token from setup-node's ~/.npmrc).
        run: bun run release
        env:
          NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
