name: Release

# Tag-driven release. Push a `v<version>` tag (use `bun run tag` to
# generate one from the current package.json versions) and this
# workflow builds every publishable workspace and publishes to npm.
#
# Locally:
#   bun changeset                         # record what's changing
#   bun run version                       # bump versions + write CHANGELOG
#   git commit -am "chore: version packages"
#   git push origin main
#   bun run tag                           # create + push v<version>
#
# The tag push fires this workflow. `bun run release` runs
# `bun scripts/build.ts && bun scripts/publish.ts`; the publish step
# augments each package.json with npm-ready fields (main / types /
# exports / files / publishConfig / repository) then runs
# `bunx changeset publish`, which compares each package.json version
# against the registry and publishes the ones that don't exist yet.
#
# Auth: NPM_TOKEN secret (Automation token from npmjs.com → Access
# Tokens) is read by npm via the auth-token line emitted by
# actions/setup-node when `NODE_AUTH_TOKEN` is set on the publish
# step. Once trusted publishing is configured per-package on
# npmjs.com (Settings → Trusted Publishing → GitHub Actions →
# `release.yml`), the workflow can swap to OIDC by removing the
# NODE_AUTH_TOKEN env line; `id-token: write` is already granted
# below.
#
# Manual trigger is also enabled (workflow_dispatch) for one-off
# republishes that don't go through a tag - useful when retrying a
# partial publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          # Pinned to 24.x so `npm` is >= 11.5.1, the minimum for
          # trusted publishing / OIDC auth. Bun is used for everything
          # else; only `bunx changeset publish` (which shells out to
          # `npm publish`) requires the system `npm`.
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
