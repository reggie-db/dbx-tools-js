name: Release

# Tag-driven release. Push a `v<version>` tag (use `bun run tag` to
# generate one from the current package.json versions) and this
# workflow publishes every publishable workspace to npm.
#
# Locally:
#   bun changeset                         # record what's changing
#   bun run version                       # bump versions + write CHANGELOG
#   git commit -am "chore: version packages"
#   git push origin main
#   bun run tag                           # create + push v<version>
#
# The tag push fires this workflow. `bun run release` runs
# `devkit release` from `@dbx-tools/devkit`, which builds every
# publishable package and then publishes each with `bun publish`. The
# build step is intentionally not duplicated here: `release` already
# builds before it publishes. Just before each `bun publish`, `release`
# stamps the publish-ready fields (the expanded conditional `exports`,
# `main`, `types`, `files`, `license`) into the manifest and restores
# the slim source manifest immediately after, so committed
# `package.json` files are never left mutated. `workspace:*` and
# `catalog:` specifiers are resolved by `bun publish`.
#
# Registry + auth: `bun publish` reads the `~/.npmrc` that
# `actions/setup-node` writes from `registry-url` plus the
# `NODE_AUTH_TOKEN` (the NPM_TOKEN automation secret from npmjs.com →
# Access Tokens) on the publish step. Dev machines publish to whatever
# their own `~/.npmrc` points at, so CI is the only place that targets
# real npm. Once trusted publishing is configured per-package on
# npmjs.com (Settings → Trusted Publishing → GitHub Actions →
# `release.yml`), drop the `NODE_AUTH_TOKEN` env line to swap to OIDC;
# `id-token: write` is already granted below.
#
# Manual trigger is also enabled (workflow_dispatch) for one-off
# republishes that don't go through a tag - useful when retrying a
# partial publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          # `setup-node` writes the `~/.npmrc` (registry + auth-token
          # line) that `bun publish` reads; `release` itself shells out
          # to `bun publish`, not `npm`. Node is pinned to 24.x so the
          # bundled `npm` is >= 11.5.1, the minimum for trusted
          # publishing / OIDC if this workflow swaps to it later.
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        # Not `--frozen-lockfile`: `bun.lock` is intentionally not
        # committed, so a frozen install has nothing to freeze against and
        # never writes the lockfile to disk. A plain `bun install` resolves
        # and writes `bun.lock`, which the pacwich-based build scripts read
        # to discover the workspaces.
        run: bun install

      - name: Publish
        # `release` builds every package and then publishes; no separate
        # build step is needed.
        run: bun run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
