name: Release

# Triggered on every push to main. On the first run after one or more
# changesets land, `changesets/action` opens a "Version Packages" PR that
# applies the version bumps and regenerates changelogs. Merging that PR
# triggers this workflow again, this time with no pending changesets, and
# `publish: bun run release` pushes the bumped packages to npm.
#
# Required repository secrets:
#   NPM_TOKEN  - npm automation token with publish access to @dbx-tools.
#                Create at https://www.npmjs.com/settings/<your-user>/tokens
#                with type "Automation" and "Read and Publish" scope.
#
# The default GITHUB_TOKEN handles the version PR; you do not need to add
# a PAT for that side.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
          commit: "chore: version packages"
          title: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
