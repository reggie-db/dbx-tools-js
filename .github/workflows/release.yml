name: Release

# Tag-driven release. Push a `v<version>` tag (use `bun run tag` to
# generate one from the current package.json versions) and this
# workflow builds every publishable workspace and publishes to npm.
#
# Locally:
#   bun changeset                         # record what's changing
#   bun run version                       # bump versions + write CHANGELOG
#   git commit -am "chore: version packages"
#   git push origin main
#   bun run tag                           # create + push v<version>
#
# The tag push fires this workflow. `bun run release` runs
# `devkit release` (build, then publish) from `@dbx-tools/devkit`. The
# publish step stages each package into a gitignored `.publish/` dir,
# merges in the publish-ready fields (main / types / exports / files /
# license / repository) from `package.default.json` /
# `package.enforced.json`, resolves `workspace:*` and `catalog:`
# specifiers to real version ranges, skips versions already on the
# registry, and runs `npm publish` from each stage. Source
# `package.json` files are never mutated.
#
# Registry: the publish script defaults to a local Verdaccio
# (`http://localhost:4873`) so dev machines can never accidentally hit
# real npm. CI overrides via `NPM_REGISTRY` (set on the publish step
# below).
#
# Auth: NPM_TOKEN secret (Automation token from npmjs.com → Access
# Tokens) is read by bun publish via the auth-token line emitted by
# actions/setup-node when `NODE_AUTH_TOKEN` is set on the publish
# step. Once trusted publishing is configured per-package on
# npmjs.com (Settings → Trusted Publishing → GitHub Actions →
# `release.yml`), the workflow can swap to OIDC by removing the
# NODE_AUTH_TOKEN env line; `id-token: write` is already granted
# below.
#
# Manual trigger is also enabled (workflow_dispatch) for one-off
# republishes that don't go through a tag - useful when retrying a
# partial publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          # Pinned to 24.x so `npm` is >= 11.5.1, the minimum for
          # trusted publishing / OIDC auth. `devkit release` uses `npm`
          # for both the `npm view` existence check and the actual
          # `npm publish` upload, reading the `~/.npmrc` auth-token line
          # that `setup-node` writes.
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install
        # Not `--frozen-lockfile`: `bun.lock` is intentionally not
        # committed, so a frozen install has nothing to freeze against and
        # never writes the lockfile to disk. A plain `bun install` resolves
        # and writes `bun.lock`, which the pacwich-based build scripts read
        # to discover the workspaces.
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish
        run: bun run release
        env:
          # Override the script's local-Verdaccio default and target
          # real npm. Must match `setup-node`'s `registry-url` above
          # so the auth-token line in `~/.npmrc` is keyed correctly.
          NPM_REGISTRY: "https://registry.npmjs.org/"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
